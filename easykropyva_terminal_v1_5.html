<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EasyKropyva Tactical Terminal v1.5</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #0a1116;
      --panel: #111a22;
      --panel-2: #15202a;
      --line: #1f2d3a;
      --text: #d4dde6;
      --text-dim: #8a9ba8;
      --ok: #39FF14;
      --warn: #FFD700;
      --danger: #FF3131;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top right, #12202a 0%, var(--bg) 50%);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel) 0%, #0c141b 100%);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 14px;
      color: var(--ok);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tool-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .tool-btn:hover { border-color: var(--warn); }
    .tool-btn.active {
      border-color: var(--ok);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--ok) 50%, transparent);
      color: var(--ok);
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin: 8px 0 4px 0;
      padding-left: 4px;
      border-left: 2px solid var(--ok);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      transition: all 0.3s ease;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .panel-header:hover { color: var(--warn); }

    .panel-body {
      margin-top: 10px;
      display: block;
    }

    .panel-body.hidden {
      display: none;
    }

    .panel.compact {
      padding: 6px 10px;
    }

    .panel.compact .row {
      padding: 3px 0;
      font-size: 11px;
    }

    .panel.list-panel {
      flex: 1;
      overflow-y: auto;
      min-height: 100px;
      max-height: 200px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    #coord-display {
      font-family: ui-monospace, "Cascadia Mono", monospace;
      font-size: 12px;
      color: var(--warn);
    }

    #node-list {
      max-height: 38vh;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .node-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      background: #121d26;
    }

    .node-item:hover { border-color: var(--warn); }
    .node-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .node-meta { margin-top: 4px; font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; }

    .map-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map { width: 100%; height: 100%; }

    .radar-icon { background: transparent; border: none; }
    .radar-ring {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid;
      border-radius: 50%;
      opacity: 0.6;
      animation: pulse 1.5s infinite ease-out;
    }
    .radar-blip {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      top: 6px;
      left: 6px;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.9; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    #elevation-panel {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 640px;
      height: 480px;
      background: rgba(14, 23, 31, 0.98);
      border: 1px solid var(--line);
      border-radius: 12px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .elev-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .elev-head button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
    }

    #elevation-stats {
      display: block;
      padding: 10px;
      font-size: 11px;
      color: var(--ok);
      border-bottom: 1px solid var(--line);
      line-height: 1.6;
      background: rgba(0,0,0,0.2);
    }
    #elevation-stats span {
      display: inline-block;
      margin-right: 12px;
    }

    .chart-wrap {
      flex: 1;
      padding: 8px;
      min-height: 120px;
      position: relative;
    }

    #elevationChart {
      width: 100% !important;
      height: 100% !important;
    }

    /* Modal styles */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      min-width: 280px;
      max-width: 350px;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-body {
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .form-row label {
      color: var(--text-dim);
    }

    .form-row select, .form-row input {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      min-width: 140px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* List item styles */
    .list-item {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-item:hover {
      border-color: var(--warn);
    }

    .list-item .name {
      color: var(--text);
      font-weight: 500;
    }

    .list-item .type {
      color: var(--text-dim);
      font-size: 10px;
    }

    .list-item .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    @media (max-width: 980px) {
      body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; overflow: visible; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: none; height: auto; overflow: visible; padding: 10px; }
      .toolbar { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
      #elevation-panel { width: calc(100% - 20px); right: 10px; bottom: 10px; height: auto; min-height: 250px; }
      .map-wrap { height: 60vh; }
    }

    .topo-blend {
      mix-blend-mode: screen;
      filter: invert(1) grayscale(1) opacity(0.4) contrast(1.2);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="title">EASYKROPYVA · TERMINAL v1.5</div>
    <div style="font-size: 10px; color: var(--text-dim); text-align: center; margin-bottom: 10px;">Build: 2026-05-16 04:56</div>

    <!-- Секція: Розгортання -->
    <div class="section-title">РОЗГОРТАННЯ</div>
    <div class="toolbar">
      <button id="btn-add-home" class="tool-btn" style="border-color: #ff9800; color: #ff9800">+ HOME</button>
      <button id="btn-add-sensor" class="tool-btn">+ SENSOR</button>
      <button id="btn-add-relay" class="tool-btn">+ RELAY</button>
      <button id="btn-add-target" class="tool-btn">+ TARGET</button>
    </div>
    <div class="toolbar" style="margin-top:8px; border-top:1px solid var(--line); padding-top:8px;">
      <button id="btn-range" class="tool-btn" onclick="toggleMode('range')" title="Measurement / Elevation Profile">RANGE/LOS</button>

      <button id="btn-clear" class="tool-btn" onclick="clearAll()" style="border-color: var(--danger); color: var(--danger)">CLEAR ALL</button>
    </div>

    <!-- Секція: Карта -->
    <div class="section-title">КАРТА</div>
    <div class="toolbar" style="grid-template-columns: 1fr 1fr;">
      <button id="btn-map-topo" class="tool-btn active">TOPO</button>
      <button id="btn-map-sat" class="tool-btn">SAT</button>
    </div>

    <!-- Секція: Статус -->
    <div class="section-title">СТАТУС</div>
    <div class="panel compact">
      <div class="panel-header" onclick="toggleStatusPanel()">
         <span id="status-summary" style="font-size: 11px; font-weight: bold; color: var(--ok);">ONLINE • 0 NODES</span>
         <span id="status-chevron">▼</span>
      </div>
      <div id="status-body" class="panel-body hidden">
        <div class="row"><span>COORD</span><span id="coord-display">--</span></div>
        <div class="row"><span>NODES</span><span id="node-count">0</span></div>
        <div class="row"><span>TARGETS</span><span id="target-count">0</span></div>
        <div class="row"><span>HOME</span><span id="home-status">--</span></div>
        <div class="row"><span>NETWORK</span><span id="network-status">ONLINE</span></div>
      </div>
    </div>

    <!-- Секція: Список об'єктів -->
    <div class="section-title">ОБ'ЄКТИ</div>
    <div class="panel list-panel">
      <div id="node-list"></div>
    </div>
  </aside>

  <!-- Модальне вікно для TARGET -->
  <div id="target-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-title">Новий TARGET</div>
      <div class="modal-body">
        <div class="form-row">
          <label>Тип цілі:</label>
          <select id="target-alt-type">
            <option value="ground">Земля (наземний)</option>
            <option value="air">Повітря (БПЛА)</option>
          </select>
        </div>
        <div class="form-row" id="altitude-row" style="display:none;">
          <label>Висота (м):</label>
          <input type="number" id="target-altitude" value="100" min="0" max="1000">
        </div>
        <div class="form-row">
          <label>Координати:</label>
          <span id="target-coords">--</span>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-target-cancel" class="tool-btn">Скасувати</button>
        <button id="btn-target-confirm" class="tool-btn" style="border-color: var(--ok); color: var(--ok);">Встановити</button>
      </div>
    </div>
  </div>

  <!-- Модальне вікно підтвердження для нод (SENSOR/RELAY) -->
  <div id="confirm-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-title" id="confirm-title">Нова НОДА</div>
      <div class="modal-body">
        <div class="form-row">
          <label>Висота антени (м):</label>
          <input type="number" id="node-confirm-alt" value="2.0" step="0.1" min="0">
        </div>
        <div class="form-row" id="node-model-row">
          <label>Модель пристрою:</label>
          <select id="node-confirm-model">
            <option value="1">1 Micro (433)</option>
            <option value="3">3 Micro (433)</option>
            <option value="relay">Relay (900)</option>
          </select>
        </div>
        <div class="row" style="margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px;">
          <span>COORD:</span><span id="confirm-coords" style="color: var(--text-dim); font-size: 11px;"></span>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-confirm-cancel" class="tool-btn">Скасувати</button>
        <button id="btn-confirm-ok" class="tool-btn" style="border-color: var(--ok); color: var(--ok);">Встановити</button>
      </div>
    </div>
  </div>

  <main class="map-wrap">
    <div id="map"></div>

    <section id="elevation-panel">
      <div class="elev-head">
        <span>ELEVATION PROFILE</span>
        <button onclick="closeElevation()">CLOSE</button>
      </div>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:8px; padding:10px; border-bottom:1px solid var(--line); background: rgba(255,255,255,0.03);">
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Висота А (м)</label>
          <input id="los-source-alt" type="number" value="2.0" step="0.1" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Ціль Б</label>
          <select id="los-target-type" onchange="updateTargetAltInput()" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
            <option value="ground" selected>Наземна</option>
            <option value="air">Повітряна</option>
          </select>
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Висота Б (м)</label>
          <input id="los-target-alt" type="number" value="2.0" step="0.1" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Частота (МГц)</label>
          <input id="los-freq" type="number" value="433" step="1" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Потужність (dBm)</label>
          <input id="los-tx-power" type="number" value="20" title="20dBm = 100mW, 30dBm = 1W" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; gap:2px;">
          <label style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Антена (dBi)</label>
          <input id="los-ant-gain" type="number" value="3" style="background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:4px; font-size:11px; padding:2px 4px;">
        </div>
        <button id="los-recalc" class="tool-btn" style="grid-column: span 1; font-size:10px; align-self: end; height: 22px;">⟳ LOS</button>
      </div>
      <div id="elevation-stats"><span>DIST: -</span><span>MAX ALT: -</span></div>
      <div class="chart-wrap"><canvas id="elevationChart"></canvas></div>
      <div style="padding:4px 10px; border-top:1px solid var(--line); display:flex; justify-content:flex-end;">
        <button onclick="resetRange()" style="background:none; border:none; color:var(--text-dim); font-size:10px; cursor:pointer;">🗑 ОЧИСТИТИ ПРОФІЛЬ</button>
      </div>
    </section>
  </main>

  <script>
    // =============================================
    // EasyKropyva - Tactical Terminal v1.4
    // =============================================

    const map = L.map('map', { zoomControl: false }).setView([48.8894, 36.3197], 13);

    // ---- Offline Coordinate Grid (завжди працює) ----
    const GridLayer = L.GridLayer.extend({
        createTile: function(coords) {
            const tile = document.createElement('div');
            tile.style.width = '100%';
            tile.style.height = '100%';
            tile.style.border = '1px solid rgba(255,255,255,0.08)';
            tile.style.boxSizing = 'border-box';

            const size = this.getTileSize();
            const label = document.createElement('div');
            label.style.position = 'absolute';
            label.style.top = '4px';
            label.style.left = '4px';
            label.style.fontSize = '10px';
            label.style.color = 'rgba(138, 155, 168, 0.5)';
            label.style.fontFamily = 'monospace';

            const bounds = this._tileCoordsToBounds(coords);
            const lat = bounds.getNorth().toFixed(3);
            const lng = bounds.getWest().toFixed(3);
            label.textContent = `${lat},${lng}`;

            tile.appendChild(label);
            return tile;
        }
    });
    new GridLayer({ tileSize: 256, opacity: 0.6, zIndex: 0 }).addTo(map);

    // ---- Map Layers ----
    const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenTopoMap',
        maxZoom: 17,
        zIndex: 1
    });

    const satLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google Satellite',
        maxZoom: 20,
        zIndex: 1
    });

    topoLayer.addTo(map);
    let activeLayer = topoLayer;

    function switchMap(type) {
        map.removeLayer(topoLayer);
        map.removeLayer(satLayer);
        
        document.getElementById('btn-map-topo').classList.remove('active');
        document.getElementById('btn-map-sat').classList.remove('active');

        if (type === 'topo') {
            topoLayer.addTo(map);
            activeLayer = topoLayer;
            document.getElementById('btn-map-topo').classList.add('active');
        } else if (type === 'sat') {
            satLayer.addTo(map);
            activeLayer = satLayer;
            document.getElementById('btn-map-sat').classList.add('active');
        }
    }

    document.getElementById('btn-map-topo').onclick = () => switchMap('topo');
    document.getElementById('btn-map-sat').onclick = () => switchMap('sat');

    let isOnline = true;
    topoLayer.on('tileerror', () => {
        if (isOnline) {
            isOnline = false;
            updateNetworkStatus();
        }
    });

    // Перевірка мережі кожні 10 сек
    setInterval(() => {
        fetch('https://tile.opentopomap.org/0/0/0.png', { mode: 'no-cors', cache: 'no-store' })
            .then(() => { if (!isOnline) { isOnline = true; updateNetworkStatus(); } })
            .catch(() => { if (isOnline) { isOnline = false; updateNetworkStatus(); } });
    }, 10000);

    function updateNetworkStatus() {
        const el = document.getElementById('network-status');
        if (!el) return;
        if (isOnline) {
            el.innerText = 'ONLINE';
            el.style.color = 'var(--ok)';
        } else {
            el.innerText = 'OFFLINE';
            el.style.color = 'var(--danger)';
        }
    }

    L.control.zoom({ position: 'topright' }).addTo(map);

    let meshGroup = L.layerGroup().addTo(map);
    let meshActive = false;

    function toggleMesh() {
        meshActive = !meshActive;
        const btn = document.getElementById('mesh-toggle-btn');
        btn.innerText = meshActive ? 'MESH: ON' : 'MESH: OFF';
        btn.style.borderColor = meshActive ? 'var(--ok)' : 'var(--line)';
        if (!meshActive) {
            meshGroup.clearLayers();
        } else {
            updateMesh();
        }
    }

    async function updateMesh() {
        if (!meshActive) return;
        meshGroup.clearLayers();
        
        try {
            const btn = document.getElementById('mesh-toggle-btn');
            btn.innerText = 'MESH: CALC...';
            
            const res = await fetch('/api/mesh_topology');
            const topology = await res.json();
            
            const masterIds = new Set(topology.masters || []);

            // Відновлюємо іконки до стандартних перед застосуванням майстер-статусу
            Object.keys(nodeMarkers).forEach(id => {
                const m = nodeMarkers[id];
                if (m.tactical_type) {
                    m.setIcon(ICONS[m.tactical_type] || ICONS.sensor);
                }
            });

            // Малюємо лінки
            topology.links.forEach(link => {
                const n1 = nodeMarkers[link.source];
                const n2 = nodeMarkers[link.target];
                if (!n1 || !n2) return;
                
                const p1 = n1.getLatLng();
                const p2 = n2.getLatLng();
                
                // Кольори: Зелений (ОК), Жовтий (Горизонт), Помаранчевий (Френель), Червоний (Рельєф)
                let color = 'var(--ok)';
                let dash = null;
                let weight = 3;
                let statusMsg = 'OK';

                if (link.beyond_horizon) {
                    color = '#ffd700'; // Gold
                    dash = '10, 5';
                    statusMsg = 'BEYOND HORIZON';
                } else if (!link.terrain_los) {
                    color = '#ff0033'; // Bright Red
                    dash = '3, 6';
                    weight = 4;
                    statusMsg = 'TERRAIN BLOCKED';
                } else if (!link.fresnel_los) {
                    color = '#ff9800'; // Orange
                    dash = '5, 5';
                    statusMsg = 'FRESNEL BLOCKED';
                }
                
                const poly = L.polyline([p1, p2], {
                    color: color,
                    weight: weight,
                    opacity: 0.9,
                    dashArray: dash,
                    interactive: true
                }).addTo(meshGroup);

                        iconSize: [20, 20], iconAnchor: [10, 10]

    // Retry fetch з декількома спробами
    async function fetchWithRetry(url, options = {}, maxRetries = 3) {
        for (let i = 0; i < maxRetries; i++) {
            try {
                const res = await fetch(url, options);
                if (res.ok) return res;
                if (res.status === 504 && i < maxRetries - 1) {
                    console.log(`Retry ${i + 1}/${maxRetries} after 504...`);
                    await new Promise(r => setTimeout(r, 1500 * (i + 1)));
                    continue;
                }
                return res;
            } catch (e) {
                if (i === maxRetries - 1) throw e;
                await new Promise(r => setTimeout(r, 1500 * (i + 1)));
            }
        }
    }

    async function showElevation(p1, p2) {
        lastLosPoints = [p1, p2];
        const panel = document.getElementById('elevation-panel');
        panel.style.display = 'flex';
        document.getElementById('elevation-stats').innerHTML = '<span style="color:#8a9ba8">Завантаження даних...</span>';

        const samples = 30;
        const coords = [];
        elevationPoints = [];
        for (let i = 0; i <= samples; i++) {
            const lat = p1.lat + (p2.lat - p1.lat) * (i / samples);
            const lng = p1.lng + (p2.lng - p1.lng) * (i / samples);
            coords.push(`${lat},${lng}`);
            elevationPoints.push([lat, lng]);
        }

        // Малюємо лінію
        if (rangePolyline) map.removeLayer(rangePolyline);
        rangePolyline = L.polyline([p1, p2], { color: '#29b6f6', weight: 3, dashArray: '5, 5' }).addTo(map);

        // Малюємо точки на лінії для наочності
        elevationMarkers.clearLayers();
        elevationPoints.forEach((pt, idx) => {
            if (idx % 2 === 0) {
                L.circleMarker(pt, {
                    radius: 2,
                    color: '#29b6f6',
                    fillColor: '#fff',
                    fillOpacity: 0.8,
                    weight: 1,
                    interactive: false
                }).addTo(elevationMarkers);
            }
        });

        let elevations = null;
        let elevData = null;

        try {
            // Fetch elevation data з retry
            console.log('Fetching elevation data...');
            const elevRes = await fetchWithRetry(`https://api.open-elevation.com/api/v1/lookup?locations=${coords.join('|')}`, {}, 3);
            
            if (elevRes.ok) {
                elevData = await elevRes.json();
                if (elevData.results && elevData.results.length > 0) {
                    elevations = elevData.results.map(r => r.elevation);
                }
            }
        } catch (e) {
            console.warn('Elevation API failed:', e.message);
        }

        const distM = p1.distanceTo(p2);
        const distKm = distM / 1000;
        const distStr = distM < 1000 ? `${distM.toFixed(0)} м` : `${distKm.toFixed(2)} км`;

        // Отримуємо параметри цілі з UI
        const sourceAlt = parseFloat(document.getElementById('los-source-alt').value) || 2.0;
        const targetType = document.getElementById('los-target-type').value;
        const targetAlt = parseFloat(document.getElementById('los-target-alt').value) || 2.0;
        const freqMhz = parseFloat(document.getElementById('los-freq').value) || 433;

        let h_a = sourceAlt;
        let h_b = targetAlt;

        // Завжди робимо LOS аналіз через свій бекенд
        try {
            console.log('Fetching LOS analysis...');
            const losRes = await fetchWithRetry('/api/los', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lat1: p1.lat, lng1: p1.lng,
                    lat2: p2.lat, lng2: p2.lng,
                    base_height_a: h_a, base_height_b: h_b, samples: samples,
                    target_type: targetType,
                    target_altitude_m: targetAlt,
                    freq_mhz: freqMhz
                })
            }, 2);
            
            if (!losRes.ok) throw new Error(`LOS API error: ${losRes.status}`);
            const losData = await losRes.json();

            // Використовуємо дані рельєфу з LOS якщо open-elevation недоступний
            if (!elevations && losData['висота_початку_рельєф']) {
                // Генеруємо приблизний профіль на основі LOS даних
                const h1 = losData['висота_початку_рельєф'];
                const h2 = losData['висота_кінця_рельєф'];
                elevations = [];
                for (let i = 0; i <= samples; i++) {
                    elevations.push(h1 + (h2 - h1) * (i / samples));
                }
            }

            // Якщо є дані рельєфу — показуємо графік
            if (losData.terrain_profile) {
                const labels = losData.terrain_profile.map((_, i) => {
                    const d = (i / samples) * distM;
                    return d < 1000 ? `${d.toFixed(0)}м` : `${(d/1000).toFixed(1)}км`;
                });
                renderElevationChart(labels, losData.terrain_profile, losData.los_beam, losData.fresnel_60, losData['пряма_видимість']);
            } else {
                renderElevationChart(['0м', '100м'], [0, 0], [1, 1], [0.5, 0.5], false);
            }

            const maxAlt = losData.terrain_profile ? Math.max(...losData.terrain_profile) : '--';
            const losStatus = losData['пряма_видимість'];
            const requiredLift = losData['необхідний_підйом_м'];
            const distanceM = losData['відстань_м'] || distM;
            const distanceStr = distanceM < 1000 ? `${distanceM.toFixed(0)} м` : `${(distanceM/1000).toFixed(2)} км`;
            
            // Розрахунок бюджету
            const txPower = parseFloat(document.getElementById('los-tx-power').value) || 20;
            const antGain = parseFloat(document.getElementById('los-ant-gain').value) || 3;
            const pathLoss = losData['path_loss_db'] || 0;
            const rssi = txPower + antGain - pathLoss;
            const sensitivity = -110; 

            let rssiColor = '#00e676'; 
            if (rssi < sensitivity) rssiColor = '#ff3366'; 
            else if (rssi < sensitivity + 15) rssiColor = '#ffaa00'; 

            const typeLabel = targetType === 'ground' ? 'Наземна' : 'Повітряна';

            let losHtml = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:11px;">
                    <div><b>ВІДСТАНЬ:</b> ${distanceStr}</div>
                    <div><b>МАКС ВИСОТА:</b> ${maxAlt} м</div>
                    <div><b>RSSI:</b> <span style="color:${rssiColor}; font-weight:bold;">${rssi.toFixed(1)} dBm</span></div>
                    <div><b>PATH LOSS:</b> ${pathLoss} dB</div>
                </div>
                <div style="margin-top:10px; padding:8px; background:rgba(0,0,0,0.2); border-radius:4px; border-left:4px solid ${losStatus ? '#00e676' : '#ff3366'}">
                    <b style="color:${losStatus ? '#00e676' : '#ff3366'}">${losData.статус}</b>
                    ${requiredLift > 0 ? `<br><span style="color:#ffaa00; font-size:10px">⚠ Потрібен підйом: +${requiredLift}м</span>` : ''}
                    <div style="font-size:9px; color:#8a9ba8; margin-top:4px;">
                        Частота: ${freqMhz} МГц | А: ${sourceAlt}м | Б: ${targetAlt}м (${typeLabel})
                    </div>
                </div>
            `;
            
            document.getElementById('elevation-stats').innerHTML = losHtml;
            
            if (losData.terrain_profile) {
                const labels = losData.terrain_profile.map((_, i) => {
                    const d = (i / (losData.terrain_profile.length - 1)) * distanceM;
                    if (i === 0) return 'A';
                    if (i === losData.terrain_profile.length - 1) return 'B';
                    return d < 1000 ? `${d.toFixed(0)}м` : `${(d / 1000).toFixed(1)}км`;
                });

                renderElevationChart(
                    labels,
                    losData.terrain_profile,
                    losData.los_beam,
                    losData.fresnel_60,
                    losData.terrain_los,
                    losData.beyond_horizon
                );
            }
            console.log('Profile loaded successfully');

        } catch (err) {
            console.error('LOS API failed:', err);
            document.getElementById('elevation-stats').innerHTML = `<span style="color:#ff3366">Помилка LOS: ${err.message}</span>`;
            renderElevationChart(['A', 'B'], [0, 0], [0, 0], false);
        }
    }

    function renderElevationChart(labels, terrainData, losData, fresnelData, terrainLos, beyondHorizon) {
        const ctx = document.getElementById('elevationChart').getContext('2d');
        if (elevationChart) elevationChart.destroy();

        let beamColor = 'var(--ok)';
        if (beyondHorizon) beamColor = 'var(--warn)';
        else if (!terrainLos) beamColor = 'var(--danger)';

        elevationChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'LOS Beam',
                        data: losData,
                        borderColor: beamColor,
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: false,
                        zIndex: 10
                    },
                    {
                        label: 'Fresnel 60%',
                        data: fresnelData,
                        borderColor: 'rgba(255, 255, 255, 0.2)',
                        borderDash: [5, 5],
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Terrain',
                        data: terrainData,
                        borderColor: '#8a9ba8',
                        backgroundColor: 'rgba(31, 45, 58, 0.8)',
                        fill: true,
                        tension: 0.1,
                        pointRadius: 1,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#fff'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                onHover: (event, elements) => {
                    if (elements && elements.length > 0) {
                        const index = elements[0].index;
                        if (elevationPoints[index]) {
                            if (!hoverMarker) {
                                hoverMarker = L.circleMarker(elevationPoints[index], {
                                    radius: 5, color: '#fff', weight: 2, fillColor: '#00e676', fillOpacity: 1
                                }).addTo(map);
                            } else {
                                hoverMarker.setLatLng(elevationPoints[index]);
                            }
                        }
                    } else {
                        if (hoverMarker) {
                            map.removeLayer(hoverMarker);
                            hoverMarker = null;
                        }
                    }
                },
                onLeave: (event, elements) => {
                    if (hoverMarker) {
                        map.removeLayer(hoverMarker);
                        hoverMarker = null;
                    }
                },
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#8a9ba8', font: { size: 10 } }, grid: { display: false } },
                    y: { ticks: { color: '#8a9ba8', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });
    }

    // ---- Clear All ----
    async function clearAll() {
        try {
            console.log('Clearing all...');
            Object.values(nodeMarkers).forEach(m => map.removeLayer(m));
            Object.values(targetMarkers).forEach(m => map.removeLayer(m));
            if (homeMarker) { map.removeLayer(homeMarker); homeMarker = null; }
            homePoint = null;
            updateHomeStatus();
            nodeMarkers = {};
            targetMarkers = {};
            autoCounter = { sensor: 0, relay: 0, target: 0 };
            resetRange();
            
            // Clear home on server
            await fetch('/api/home', { method: 'DELETE' });
            
            const res = await fetch('/api/clear', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            console.log('Clear API response:', res.status);
            
            fetchData();
            console.log('Clear completed');
        } catch (err) {
            console.error('Clear failed:', err);
            alert('Clear failed: ' + err.message);
        }
    }

    // ---- Delete Single Item ----
    async function deleteNode(id) {
        await fetch(`/api/nodes/${id}`, { method: 'DELETE' });
        fetchData();
    }
    async function deleteTarget(id) {
        await fetch(`/api/targets/${id}`, { method: 'DELETE' });
        fetchData();
    }

    async function updateNodeConfig(id, data) {
        try {
            await fetch(`/api/nodes/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            fetchData();
        } catch (e) { console.error('Update failed:', e); }
    }

    async function updateTargetConfig(id, data) {
        try {
            await fetch(`/api/targets/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            fetchData();
        } catch (e) { console.error('Target update failed:', e); }
    }
    async function fetchData() {
        try {
            const [nr, tr] = await Promise.all([fetch('/api/nodes'), fetch('/api/targets')]);
            const nodes = await nr.json();
            const targets = await tr.json();

            document.getElementById('node-count').innerText = nodes.length;
            document.getElementById('target-count').innerText = targets.length;

            const list = document.getElementById('node-list');
            list.innerHTML = '';

            // Render NODES
            const activeNodeIds = new Set();
            nodes.forEach(n => {
                activeNodeIds.add(n.id);
                if (!nodeMarkers[n.id] && n.lat && n.lng) {
                    const m = L.marker([n.lat, n.lng], { 
                        icon: ICONS[n.type] || ICONS.sensor,
                        draggable: true 
                    }).addTo(map);
                    
                    m.on('dragend', async (e) => {
                        const newPos = m.getLatLng();
                        await updateNodeConfig(n.id, { lat: newPos.lat, lng: newPos.lng });
                    });

                    m.on('click', (e) => {
                        if (placingMode === 'range') {
                            L.DomEvent.stopPropagation(e);
                            handleRangeClick(m.getLatLng());
                        }
                    });
                    
                    const popupContent = `
                        <div style="min-width:180px; color:#fff; background:#121d26; padding:5px;">
                            <b style="color:var(--warn)">${n.name}</b><br>
                            <div style="margin-top:10px">
                                Висота (м): <input type="number" step="0.1" value="${n.altitude_m}" 
                                    onchange="updateNodeConfig(${n.id}, {altitude_m: parseFloat(this.value)})"
                                    style="width:60px; background:#000; color:#fff; border:1px solid #444; padding:2px; font-size:12px">
                            </div>
                            <div style="margin-top:8px">
                                Модель: <select onchange="updateNodeConfig(${n.id}, {model: this.value})"
                                    style="background:#000; color:#fff; border:1px solid #444; padding:2px; font-size:12px">
                                    <option value="1" ${n.model==='1'?'selected':''}>1 Micro</option>
                                    <option value="3" ${n.model==='3'?'selected':''}>3 Micro</option>
                                    <option value="relay" ${n.model==='relay'?'selected':''}>Relay</option>
                                </select>
                            </div>
                            <div style="margin-top:8px">
                                Mesh: <button onclick="updateNodeConfig(${n.id}, {mesh_active: ${!n.mesh_active}})"
                                    style="background:${n.mesh_active?'#00e676':'#666'}; color:#000; border:none; padding:4px 10px; border-radius:4px; font-weight:bold; cursor:pointer">
                                    ${n.mesh_active?'ACTIVE':'DISABLED'}
                                </button>
                            </div>
                            <div style="margin-top:12px; border-top:1px solid #333; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                                <small style="color:#8a9ba8">ID: ${n.id}</small>
                                <button onclick="deleteNode(${n.id})" style="color:#ff3366; background:none; border:none; cursor:pointer; font-weight:bold">ВИДАЛИТИ</button>
                            </div>
                        </div>
                    `;
                    m.bindPopup(popupContent, { maxWidth: 220, className: 'tactical-popup' });
                    m.tactical_type = n.type; // Зберігаємо тип для скидання іконки
                    nodeMarkers[n.id] = m;
                } else if (nodeMarkers[n.id]) {
                    // Якщо маркер вже є, просто оновлюємо вміст попапу
                    nodeMarkers[n.id].tactical_type = n.type;
                }
                
                // List item для панелі ліворуч
                const div = document.createElement('div');
                div.className = 'list-item';
                const typeColor = n.type === 'sensor' ? '#00e676' : '#29b6f6';
                div.innerHTML = `
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:8px;height:8px;border-radius:50%;background:${typeColor};"></div>
                        <div>
                            <div class="name">${n.name}</div>
                            <div class="type">${(n.type||'').toUpperCase()} • ${n.battery||100}%</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteNode(${n.id})">×</button>
                `;
                div.onclick = (e) => { if (!e.target.classList.contains('delete-btn')) map.flyTo([n.lat, n.lng], 15); };
                list.appendChild(div);
            });

            Object.keys(nodeMarkers).forEach(id => {
                if (!activeNodeIds.has(Number(id))) { map.removeLayer(nodeMarkers[id]); delete nodeMarkers[id]; }
            });

            // Render TARGETS
            const activeTargetIds = new Set();
            targets.forEach(t => {
                activeTargetIds.add(t.id);
                if (!targetMarkers[t.id] && t.lat && t.lng) {
                    const m = L.marker([t.lat, t.lng], { 
                        icon: ICONS.target,
                        draggable: true 
                    }).addTo(map);
                    
                    m.on('dragend', async () => {
                        const newPos = m.getLatLng();
                        await updateTargetConfig(t.id, { lat: newPos.lat, lng: newPos.lng });
                    });

                    m.on('click', (e) => {
                        if (placingMode === 'range') {
                            L.DomEvent.stopPropagation(e);
                            handleRangeClick(m.getLatLng());
                        }
                    });
                    const altInfo = t.altitude_type === 'air' ? `<br/>Висота: ${t.altitude_m}м` : '';
                    m.bindPopup(`<b>${t.name}</b>${altInfo}<br/><a href="#" onclick="deleteTarget(${t.id});return false;" style="color:#ff3366">ВИДАЛИТИ</a>`);
                    m.on('contextmenu', () => deleteTarget(t.id));
                    targetMarkers[t.id] = m;
                }
                
                // List item для TARGET
                const div = document.createElement('div');
                div.className = 'list-item';
                const altLabel = t.altitude_type === 'air' ? `🚁 ${t.altitude_m}м` : '🚗 ЗЕМЛЯ';
                div.innerHTML = `
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:8px;height:8px;border-radius:50%;background:#ff3366;"></div>
                        <div>
                            <div class="name">${t.name}</div>
                            <div class="type">${altLabel}</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTarget(${t.id})">×</button>
                `;
                div.onclick = (e) => { if (!e.target.classList.contains('delete-btn')) map.flyTo([t.lat, t.lng], 15); };
                list.appendChild(div);
            });
            Object.keys(targetMarkers).forEach(id => {
                if (!activeTargetIds.has(Number(id))) { map.removeLayer(targetMarkers[id]); delete targetMarkers[id]; }
            });

            if (meshActive) updateMesh();
            updateStatusSummary(nodes, isOnline);

        } catch (e) {
            console.error(e);
        }
    }

    // ---- LOS Target Type UI Handlers ----
    const recalcLosIfActive = () => {
        if (lastLosPoints && lastLosPoints.length === 2) {
            showElevation(lastLosPoints[0], lastLosPoints[1]);
        }
    };

    document.getElementById('los-source-alt').addEventListener('input', recalcLosIfActive);
    document.getElementById('los-target-type').addEventListener('change', recalcLosIfActive);
    document.getElementById('los-target-alt').addEventListener('input', recalcLosIfActive);
    document.getElementById('los-freq').addEventListener('input', recalcLosIfActive);
    document.getElementById('los-recalc').addEventListener('click', recalcLosIfActive);

    setInterval(fetchData, 10000);
    fetchData();

    window.deleteNode = deleteNode;
    window.deleteTarget = deleteTarget;
    window.closeElevation = closeElevation;
  </script>
</body>
</html>
